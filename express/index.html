<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fee Collection ERP</title>
</head>
<body>
    <h2>💰 Fee Collection Form</h2>
    
    <form action="http://localhost:3000/fee-submit" method="POST">
        
        <label>Student Name:</label>
        <select name="studentName">
            <option value="Rahul Sharma">Rahul Sharma</option>
            <option value="Amit Kumar">Amit Kumar</option>
            <option value="Priya Singh">Priya Singh</option>
        </select>
        <br><br>

        <label>Amount (Rs.):</label>
        <input type="number" name="feeAmount" placeholder="Enter Amount" required />
        <br><br>

        <label>Fee Type:</label>
        <select name="feeType">
            <option value="Tuition Fee">Tuition Fee</option>
            <option value="Exam Fee">Exam Fee</option>
            <option value="Library Fee">Library Fee</option>
        </select>
        <br><br>

        <button type="submit">Submit Fee</button>
    </form>
</body>
</html>
